<!DOCTYPE html>
<html lang="kg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кирүү - Билим Платформасы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="glass-container">
        <div class="auth-box">
            <div class="logo-area">
                <span class="logo-icon">🎓</span>
                <h2>Кош келиңиз!</h2>
            </div>
            
            <p class="auth-subtitle">Билим платформасына кирүү</p>

            <div class="auth-inputs">
                <div class="input-wrapper">
                    <input type="email" id="auth-email" placeholder="Электрондук почта" required>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="auth-password" placeholder="Пароль" required>
                </div>
            </div>

            <div class="auth-btns">
                <button onclick="handleLogin()" class="login-btn">Кирүү</button>
                <button onclick="handleSignUp()" class="signup-btn">Катталуу</button>
            </div>

            <div id="auth-msg"></div>

            <a href="index.html" class="go-back">← Башкы бетке кайтуу</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
